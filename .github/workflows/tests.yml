name: CI

on:
  push:
    branches:
      - master
      - "feature/*"
  pull_request:
    branches:
      - master
      - "maint-**"
      - "feature/*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false
        default: "Manual trigger"

jobs:
  Python:
    uses: inveniosoftware/workflows/.github/workflows/tests-python.yml@master
    with:
      extras: "tests,docs"
